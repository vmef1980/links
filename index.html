<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Solutions - Líneas de Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background: #050508;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* CONTENEDOR DEL VIDEO DE FONDO MULTIDISPOSITIVO */
        .video-background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: #000;
        }

        .video-background-container video {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.55;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 10%, rgba(5, 5, 8, 0.75) 90%);
            pointer-events: none;
        }

        /* CONTENEDOR LOGO CALIBRADO Y RESPONSIVO */
        .neon-logo-container {
            position: relative;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Resalte Neón permanente discreto para TECH, reactivo para los demás */
        .tech-featured {
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.15);
        }

        .card:hover .neon-logo-container,
        .card:active .neon-logo-container {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
        }

        /* TARJETAS GLASSMORPHISM */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 768px) {
            .card:hover {
                transform: translateY(-6px) scale(1.015);
                background: rgba(255, 255, 255, 0.05);
                border-color: var(--neon-purple);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            }
        }

        h1 { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 sm:p-6 md:p-10">

    <!-- VIDEO DE FONDO -->
    <div class="video-background-container" id="video-root"></div>
    <div class="video-overlay"></div>

    <!-- ENCABEZADO CON TITULO CORPORATIVO Y SLOGAN -->
    <header class="text-center mt-6 sm:mt-12 mb-10 sm:mb-16 relative z-10">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-widest text-white drop-shadow-[0_0_15px_rgba(0,210,255,0.3)] mb-3">
            PUZZLE SOLUTIONS
        </h1>
        <p class="text-slate-400 font-light tracking-widest uppercase text-xs sm:text-sm px-4">
            Líneas de Negocio y Soluciones Empresariales
        </p>
    </header>

    <!-- REJILLA DE TARJETAS -->
    <main class="max-w-6xl mx-auto w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-8 relative z-10 mb-16" id="business-grid">
        <!-- Inyección dinámica -->
    </main>

    <!-- PIE DE PÁGINA REFORMADO CON FUSIÓN MODERNA Y PROTECCIÓN DE DATOS -->
    <footer class="text-center relative z-10 pb-6 w-full max-w-xl mx-auto">
        <div id="whatsapp-root"></div>
        <div class="mt-10 flex flex-col items-center justify-center select-none">
            <span class="text-[11px] font-mono tracking-[4px] text-cyan-400 uppercase bg-cyan-950/30 px-5 py-2 rounded-full border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.1)] backdrop-blur-md font-semibold inline-flex items-center gap-1.5">
                <i class="fa-solid fa-code text-[10px] text-cyan-300"></i> © 2026 • Powered by TECH
            </span>
        </div>
    </footer>

    <script>
        const RUTA_VIDEO_FONDO = "img/splash/Tech04.mp4"; 
        const WHATSAPP_NUMERO = "50241084481";
        const MSG_WHATSAPP = "Hola, me comunico desde el portal de Estrada Corporación. Solicito información sobre sus servicios y soluciones empresariales.";

        const negocios = [
            {
                id: "rompecabezas",
                nombre: "Rompecabezas de Guatemala",
                desc: "Rompecabezas y accesorioss.",
                url: "https://shop.rompecabezas.online",
                img: "img/logos/RompecabezasDeGuatemala.png",
                icon: "fa-puzzle-piece"
            },
            {
                id: "tech",
                nombre: "TECH",
                desc: "Somos expertos en soluciones de Tecnología.",
                url: "#", 
                img: "img/logos/Tech.png",
                icon: "fa-microchip",
                destacar: true 
            },
            {
                id: "ekipro",
                nombre: "EKIPRO",
                desc: "Todo lo que necesitas para viajar: maletas, mochilas y accesorios.",
                url: "https://ekipro.rompecabezas.online/",
                img: "img/logos/Ekipro.png",
                icon: "fa-suitcase-rolling"
            },
            {
                id: "organizagt",
                nombre: "Organiza GT",
                desc: "Soluciones de organización para el Hogar, Oficina e Industria.",
                url: "https://organizagt.rompecabezas.online/",
                img: "img/logos/OrganizaGT.png",
                icon: "fa-layer-group"
            },
            {
                id: "guatecocina",
                nombre: "Guate Cocina",
                desc: "Suministros de cocina para hogares, restaurantes, hoteles y negocios gastronómicos.",
                url: "https://guatecocina.rompecabezas.online/",
                img: "img/logos/GuateCocina.png",
                icon: "fa-fire-burner"
            },
            {
                id: "guate3dlabs",
                nombre: "Guate 3D Labs",
                desc: "Expertos en Impresión 3D y prototipado rápido.",
                url: "#",
                img: "img/logos/GUATE3DLABS.png",
                icon: "fa-cube"
            }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById('business-grid');
            const waRoot = document.getElementById('whatsapp-root');
            const videoRoot = document.getElementById('video-root');

            videoRoot.innerHTML = `
                <video autoplay loop muted playsinline webkit-playsinline class="pointer-events-none">
                    <source src="${RUTA_VIDEO_FONDO}" type="video/mp4">
                </video>
            `;

            negocios.forEach(biz => {
                const card = document.createElement('div');
                card.className = "card p-6 sm:p-8 flex flex-col items-center text-center cursor-pointer select-none touch-manipulation";
                card.onclick = () => window.open(biz.url, '_blank');
                
                const claseDestacar = biz.destacar ? "tech-featured" : "";

                card.innerHTML = `
                    <div class="neon-logo-container w-16 h-16 md:w-20 md:h-20 rounded-2xl ${claseDestacar}">
                        <img src="${biz.img}" alt="${biz.nombre}" class="max-w-[85%] max-h-[85%] object-contain p-1 filter drop-shadow-md" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                        <i class="fa-solid ${biz.icon} text-2xl md:text-3xl text-white hidden"></i>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold mb-2 tracking-tight text-slate-100">${biz.nombre}</h2>
                    <p class="text-xs sm:text-sm text-slate-400 font-light leading-relaxed mb-5">${biz.desc}</p>
                    <div class="mt-auto inline-flex items-center text-[10px] uppercase tracking-[2px] text-blue-400 font-semibold group">
                        Ver Catálogo y Sitio <i class="fa-solid fa-chevron-right ml-2 text-[8px] transition-transform group-hover:translate-x-1"></i>
                    </div>
                `;
                grid.appendChild(card);
            });

            waRoot.innerHTML = `
                <a href="https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(MSG_WHATSAPP)}" 
                   target="_blank" 
                   class="inline-flex items-center justify-center gap-3 w-full bg-emerald-950/20 backdrop-blur-md text-emerald-400 border border-emerald-500/30 px-6 sm:px-10 py-3.5 sm:py-4 rounded-full font-semibold text-sm sm:text-base transition-all duration-300 shadow-[0_0_20px_rgba(16,185,129,0.15)] hover:shadow-[0_0_30px_rgba(16,185,129,0.4)] hover:bg-emerald-500 hover:text-white hover:border-emerald-400 active:scale-95 uppercase tracking-[2px]">
                    <i class="fa-brands fa-whatsapp text-xl sm:text-2xl transition-transform duration-300"></i>
                    Contactar a un Asesor
                </a>
            `;
        });
    </script>
</body>
</html>
